{% extends "core/base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto space-y-8">
    <div class="text-center">
        <h2 class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-400 to-red-400 mb-4">Quiz
            Generator</h2>
        <p class="text-gray-400">Enter a topic and challenge yourself with an AI-generated quiz.</p>
    </div>

    <!-- Setup Card -->
    <div id="setup-card"
        class="bg-white/5 backdrop-blur-xl border border-white/10 p-8 rounded-2xl shadow-xl transition-all">
        <form id="quiz-form" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Quiz Topic</label>
                <input type="text" id="quiz-topic"
                    class="block w-full bg-black/20 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-pink-500 transition"
                    placeholder="e.g., Photosynthesis, World War II, Python Lists" required>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Difficulty Level</label>
                <div class="grid grid-cols-3 gap-4">
                    <label class="relative cursor-pointer">
                        <input type="radio" name="difficulty" value="Easy" class="peer sr-only">
                        <div
                            class="p-3 text-center rounded-xl bg-white/5 border border-white/10 peer-checked:bg-pink-600 peer-checked:border-pink-500 text-gray-400 peer-checked:text-white transition">
                            Easy</div>
                    </label>
                    <label class="relative cursor-pointer">
                        <input type="radio" name="difficulty" value="Medium" class="peer sr-only" checked>
                        <div
                            class="p-3 text-center rounded-xl bg-white/5 border border-white/10 peer-checked:bg-pink-600 peer-checked:border-pink-500 text-gray-400 peer-checked:text-white transition">
                            Medium</div>
                    </label>
                    <label class="relative cursor-pointer">
                        <input type="radio" name="difficulty" value="Hard" class="peer sr-only">
                        <div
                            class="p-3 text-center rounded-xl bg-white/5 border border-white/10 peer-checked:bg-pink-600 peer-checked:border-pink-500 text-gray-400 peer-checked:text-white transition">
                            Hard</div>
                    </label>
                </div>
            </div>

            <button type="submit"
                class="w-full bg-gradient-to-r from-pink-600 to-red-600 hover:from-pink-700 hover:to-red-700 text-white font-bold py-3 px-4 rounded-xl transform transition hover:scale-[1.02] shadow-lg shadow-pink-500/25">
                Generate Quiz
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-white/10">
            <label class="block text-sm font-medium text-gray-400 mb-4 text-center">Quick Start Topics</label>
            <div class="flex flex-wrap justify-center gap-3">
                <button onclick="instantQuiz('Python Programming')"
                    class="px-4 py-2 rounded-full bg-white/5 border border-white/10 hover:bg-pink-600/20 hover:border-pink-500 text-sm text-gray-300 transition-all">Python</button>
                <button onclick="instantQuiz('World History')"
                    class="px-4 py-2 rounded-full bg-white/5 border border-white/10 hover:bg-pink-600/20 hover:border-pink-500 text-sm text-gray-300 transition-all">History</button>
                <button onclick="instantQuiz('General Science')"
                    class="px-4 py-2 rounded-full bg-white/5 border border-white/10 hover:bg-pink-600/20 hover:border-pink-500 text-sm text-gray-300 transition-all">Science</button>
                <button onclick="instantQuiz('Data Science')"
                    class="px-4 py-2 rounded-full bg-white/5 border border-white/10 hover:bg-pink-600/20 hover:border-pink-500 text-sm text-gray-300 transition-all">Data
                    Science</button>
                <button onclick="instantQuiz('English Vocabulary')"
                    class="px-4 py-2 rounded-full bg-white/5 border border-white/10 hover:bg-pink-600/20 hover:border-pink-500 text-sm text-gray-300 transition-all">Vocabulary</button>
            </div>
        </div>
    </div>

    <!-- Quiz Area -->
    <div id="quiz-area" class="hidden bg-white/5 backdrop-blur-xl border border-white/10 p-8 rounded-2xl shadow-xl">
        <div class="flex justify-between items-center mb-6">
            <span class="text-gray-400">Question <span id="current-q-num">1</span>/<span id="total-q-num"></span></span>
            <span id="score-display" class="hidden text-green-400 font-bold">Score: <span
                    id="current-score">0</span></span>
        </div>

        <h3 id="question-text" class="text-2xl font-bold text-white mb-8"></h3>

        <div id="options-container" class="space-y-4">
            <!-- Options injected here -->
        </div>

        <button id="next-btn"
            class="hidden mt-8 w-full bg-white/10 hover:bg-white/20 text-white font-bold py-3 px-4 rounded-xl transition">
            Next Question
        </button>
    </div>

    <!-- Results Card -->
    <div id="results-card"
        class="hidden bg-white/5 backdrop-blur-xl border border-white/10 p-8 rounded-2xl shadow-xl text-center">
        <h3 class="text-3xl font-bold text-white mb-4">Quiz Completed!</h3>
        <div class="text-6xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-green-400 to-blue-500 mb-6">
            <span id="final-score"></span>%
        </div>
        <p class="text-gray-400 mb-8" id="result-message"></p>
        <button onclick="location.reload()"
            class="bg-white/10 hover:bg-white/20 text-white font-bold py-3 px-8 rounded-xl transition">
            Create New Quiz
        </button>
    </div>
</div>

<script>
    let questions = [];
    let currentQuestionIndex = 0;
    let score = 0;

    const setupCard = document.getElementById('setup-card');
    const quizArea = document.getElementById('quiz-area');
    const resultsCard = document.getElementById('results-card');
    const questionText = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const nextBtn = document.getElementById('next-btn');

    document.getElementById('quiz-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const topic = document.getElementById('quiz-topic').value;

        // Show loading state...
        const btn = e.target.querySelector('button');
        const originalText = btn.textContent;
        btn.textContent = "Generating...";
        btn.disabled = true;

        try {
            const response = await fetch('{% url "generate_quiz" %}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}'
                },
                body: JSON.stringify({
                    topic: topic,
                    difficulty: document.querySelector('input[name="difficulty"]:checked').value
                })
            });
            const data = await response.json();

            if (!response.ok || data.error) {
                alert("Error: " + (data.error || "An unexpected error occurred."));
                btn.textContent = originalText;
                btn.disabled = false;
                return;
            }

            questions = data.questions;
            startQuiz();

        } catch (error) {
            alert("Error generating quiz. Please check your connection.");
            btn.textContent = originalText;
            btn.disabled = false;
            console.error(error);
        }
    });

    function startQuiz() {
        setupCard.classList.add('hidden');
        quizArea.classList.remove('hidden');
        document.getElementById('total-q-num').textContent = questions.length;
        currentQuestionIndex = 0;
        score = 0;
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentQuestionIndex];
        document.getElementById('current-q-num').textContent = currentQuestionIndex + 1;
        questionText.textContent = q.question;
        optionsContainer.innerHTML = '';
        nextBtn.classList.add('hidden');

        q.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = "w-full text-left p-4 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 transition-all group hover:border-pink-500/50";
            btn.innerHTML = `<span class="inline-block w-8 h-8 rounded-full bg-white/10 text-center leading-8 mr-3 group-hover:bg-pink-500 transition-colors">${String.fromCharCode(65 + index)}</span> ${opt}`;
            btn.onclick = () => selectAnswer(index, q.correct, btn);
            optionsContainer.appendChild(btn);
        });
    }

    function selectAnswer(selectedIndex, correctIndex, btnElement) {
        // Disable all buttons
        const allBtns = optionsContainer.querySelectorAll('button');
        allBtns.forEach(b => b.disabled = true);

        if (selectedIndex === correctIndex) {
            score++;
            btnElement.classList.remove('bg-white/5', 'border-white/10');
            btnElement.classList.add('bg-green-500/20', 'border-green-500');
        } else {
            btnElement.classList.remove('bg-white/5', 'border-white/10');
            btnElement.classList.add('bg-red-500/20', 'border-red-500');

            // Show correct answer
            allBtns[correctIndex].classList.remove('bg-white/5', 'border-white/10');
            allBtns[correctIndex].classList.add('bg-green-500/20', 'border-green-500');
        }

        if (currentQuestionIndex < questions.length - 1) {
            nextBtn.classList.remove('hidden');
            nextBtn.onclick = () => {
                currentQuestionIndex++;
                showQuestion();
            }
        } else {
            nextBtn.textContent = "Finish Quiz";
            nextBtn.classList.remove('hidden');
            nextBtn.onclick = showResults;
        }
    }

    function showResults() {
        quizArea.classList.add('hidden');
        resultsCard.classList.remove('hidden');

        const percentage = Math.round((score / questions.length) * 100);
        document.getElementById('final-score').textContent = percentage;

        const msg = document.getElementById('result-message');
        if (percentage >= 80) msg.textContent = "Outstanding! You've mastered this topic.";
        else if (percentage >= 60) msg.textContent = "Good job! A little more study and you'll be perfect.";
        else msg.textContent = "Keep learning! You'll get it next time.";
    }

    function instantQuiz(topic) {
        document.getElementById('quiz-topic').value = topic;
        document.getElementById('quiz-form').dispatchEvent(new Event('submit'));
    }
</script>
{% endblock %}
