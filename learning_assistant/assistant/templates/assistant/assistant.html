{% extends "core/base.html" %}

{% block content %}
<style>
    main {
        max-width: 100% !important;
        padding: 0 !important;
    }
</style>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<div
    class="w-full h-[calc(100vh-76px)] flex flex-col bg-white/5 backdrop-blur-xl border-y border-white/10 shadow-2xl overflow-hidden">
    <!-- Chat Header -->
    <div class="p-4 border-b border-white/10 bg-white/5 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <div class="h-10 w-10 bg-blue-500/20 rounded-lg flex items-center justify-center">
                <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z">
                    </path>
                </svg>
            </div>
            <div>
                <h2
                    class="font-bold text-white bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400">
                    AI Assistant</h2>
                <div class="flex items-center space-x-2">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    <span class="text-xs text-gray-400">Online</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Chat Messages Area -->
    <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4 scroll-smooth">
        <!-- AI Welcome Message -->
        <div class="flex items-start space-x-3">
            <div class="h-8 w-8 bg-blue-500/20 rounded-lg flex items-center justify-center flex-shrink-0">
                <span class="text-blue-400 text-xs font-bold">AI</span>
            </div>
            <div class="bg-white/10 p-3 rounded-2xl rounded-tl-none text-gray-200 max-w-[80%]">
                Hello! I'm your AI learning assistant. How can I help you study today?
            </div>
        </div>
    </div>

    <!-- Input Area -->
    <div class="p-4 border-t border-white/10 bg-white/5">
        <form id="chat-form" class="flex space-x-4">
            <input type="text" id="user-input"
                class="flex-1 bg-black/20 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
                placeholder="Ask a question..." autocomplete="off">
            <button type="submit"
                class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl transition flex items-center shadow-lg shadow-blue-500/20">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                </svg>
            </button>
        </form>
    </div>
</div>

<script>
    const chatForm = document.getElementById('chat-form');
    const userInput = document.getElementById('user-input');
    const chatMessages = document.getElementById('chat-messages');

    chatForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const message = userInput.value.trim();
        if (!message) return;

        // Add User Message
        appendMessage('user', message);
        userInput.value = '';

        // Add Loading Indicator
        const loadingId = appendLoading();

        try {
            const response = await fetch('{% url "chat_api" %}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}'
                },
                body: JSON.stringify({ message: message })
            });
            
            const data = await response.json();
            
            // Remove Loading
            removeLoading(loadingId);

            if (!response.ok || data.error) {
                appendMessage('ai', "Error: " + (data.error || "An unexpected error occurred."));
                return;
            }

            // Add AI Response
            appendMessage('ai', data.response);
        } catch (error) {
            removeLoading(loadingId);
            appendMessage('ai', "Sorry, I encountered a connection error. Please try again.");
            console.error(error);
        }
    });

    function appendMessage(sender, text) {
        const div = document.createElement('div');
        div.className = `flex items-start space-x-3 ${sender === 'user' ? 'justify-end' : ''}`;

        const avatar = sender === 'ai'
            ? `<div class="h-8 w-8 bg-blue-500/20 rounded-lg flex items-center justify-center flex-shrink-0"><span class="text-blue-400 text-xs font-bold">AI</span></div>`
            : `<div class="h-8 w-8 bg-purple-500/20 rounded-lg flex items-center justify-center flex-shrink-0 order-2"><span class="text-purple-400 text-xs font-bold">You</span></div>`;

        const bubble = `<div class="${sender === 'user' ? 'bg-purple-600 text-white rounded-tr-none' : 'bg-white/10 text-gray-200 rounded-tl-none prose prose-invert max-w-none'} p-3 rounded-2xl max-w-[80%] shadow-md text-sm md:text-base">
            ${sender === 'ai' ? marked.parse(text) : text}
        </div>`;

        div.innerHTML = sender === 'ai' ? avatar + bubble : bubble + avatar;
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function appendLoading() {
        const id = 'loading-' + Date.now();
        const div = document.createElement('div');
        div.id = id;
        div.className = "flex items-start space-x-3";
        div.innerHTML = `
            <div class="h-8 w-8 bg-blue-500/20 rounded-lg flex items-center justify-center flex-shrink-0"><span class="text-blue-400 text-xs font-bold">AI</span></div>
            <div class="bg-white/10 p-4 rounded-2xl rounded-tl-none flex space-x-1 items-center h-10">
                <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce"></div>
                <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
                <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
            </div>
        `;
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        return id;
    }

    function removeLoading(id) {
        const el = document.getElementById(id);
        if (el) el.remove();
    }
</script>
<style>
    /* Custom Markdown Styles */
    .prose h1,
    .prose h2,
    .prose h3,
    .prose h4 {
        background: linear-gradient(to right, #4ade80, #22c55e);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-weight: bold;
        margin-top: 1rem;
        margin-bottom: 0.5rem;
        display: inline-block;
    }

    .prose strong {
        color: #e2e8f0;
        /* Light gray for bold text */
    }

    .prose ul {
        list-style-type: disc;
        padding-left: 1.5rem;
    }

    .prose p {
        margin-bottom: 0.5rem;
    }
</style>
{% endblock %}
